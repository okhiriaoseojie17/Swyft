<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swyft — Fast File Transfer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon-96x96.png?v=v1" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=v1" />
  <link rel="shortcut icon" href="favicon.ico?v=v1" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=v1" />
  <meta name="apple-mobile-web-app-title" content="Swyft" />
  <link rel="manifest" href="site.webmanifest?v=v1" />
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1><img src="Swyft_full_logo_colured.png" alt="Swyft" width="260" height="180"></h1>
      <p>Peer-to-peer file transfer · no accounts · no limits</p>
    </div>

    <div class="mode-selector">
      <a href="sender.html">
        <button class="mode-btn">
          <span style="font-size:26px;">📤</span>
          <span>Send Files</span>
        </button>
      </a>
      <a href="receiver.html">
        <button class="mode-btn">
          <span style="font-size:26px;">📥</span>
          <span>Receive Files</span>
        </button>
      </a>
    </div>

    <p style="color:rgba(255,255,255,0.25); font-size:11.5px; text-align:center; margin-top:28px; letter-spacing:0.04em;">
      End-to-end encrypted · files never touch our servers
    </p>
  </div>
</body>
</html>
